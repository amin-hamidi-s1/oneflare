server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # NOTE on the two proxy blocks below:
    # On Cloudflare Containers these never execute — the Worker (src/index.js)
    # routes /api and /ws straight to the backend container before any request
    # reaches nginx. They exist only for local `docker-compose`, where nginx
    # proxies to the "backend" service.
    #
    # The upstream is given via a $variable (not a literal host) on purpose:
    # with a literal `proxy_pass http://backend:8000`, nginx resolves "backend"
    # at startup and CRASHES ("host not found in upstream") wherever that host
    # doesn't exist — e.g. Cloudflare. Using a variable defers resolution to
    # request time, so nginx always starts; the name is only looked up (via the
    # resolver) if a request actually hits these locations, which only happens
    # under docker-compose.
    resolver 127.0.0.11 valid=10s ipv6=off;  # docker embedded DNS

    location /api {
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /ws {
        set $backend_ws http://backend:8000;
        proxy_pass $backend_ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
